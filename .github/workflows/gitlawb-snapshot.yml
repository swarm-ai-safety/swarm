name: gitlawb snapshot refresh

# Keep the dashboard's SoftMetrics-scored backfill snapshot fresh.
#
# main is a protected branch (requires the quality-gate check), so a bot cannot
# push a regenerated snapshot directly. Instead we trigger a Vercel rebuild via a
# deploy hook: the build (scripts/vercel-build.sh) re-runs the real swarm gitlawb
# bridge server-side and regenerates the scored snapshot. No git push, no PR,
# no branch-protection conflict. Live updates still stream over the WebSocket
# in-browser; this just refreshes the first-paint history.
#
# Setup: create a Deploy Hook in the Vercel project (Settings -> Git -> Deploy
# Hooks) and add its URL as the repo secret VERCEL_DEPLOY_HOOK. Without the
# secret this workflow is a graceful no-op.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

concurrency:
  group: gitlawb-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set; skipping scheduled refresh."
            echo "Add it (Vercel: Settings -> Git -> Deploy Hooks) to enable."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" >/dev/null && echo "Triggered Vercel rebuild."
