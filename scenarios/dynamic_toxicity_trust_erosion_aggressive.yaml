# Dynamic Toxicity: Trust Erosion (Aggressive)
#
# Lower exit threshold (0.25 vs 0.35) and higher beta (0.6 vs 0.3)
# to test whether honest agent exit can endogenously push a sub-critical
# adversarial fraction past the phase transition boundary.
#
# Starting at 30% adversarial — below the static threshold.

scenario_id: dynamic_toxicity_trust_erosion_aggressive
description: "Trust erosion (aggressive): low exit threshold, high sensitivity"
motif: dynamic_toxicity

agents:
  - type: honest
    count: 7
  - type: opportunistic
    count: 2
  - type: deceptive
    count: 1

governance:
  transaction_tax_rate: 0.0
  transaction_tax_split: 0.5
  reputation_decay_rate: 0.95
  bandwidth_cap: 10
  staking_enabled: false
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  audit_enabled: true
  audit_probability: 0.1
  audit_threshold_p: 0.4

simulation:
  n_epochs: 30
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 3

payoff:
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

dynamic_toxicity:
  enabled:
    - trust_erosion
  trust_erosion:
    beta: 0.6
    exit_threshold: 0.25
    window: 2
    min_honest: 1

success_criteria:
  min_epochs: 30
  min_agents: 5
  min_net_social_welfare: 0.0

outputs:
  event_log: "logs/dynamic_toxicity_trust_erosion_aggressive_events.jsonl"
