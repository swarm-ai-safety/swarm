# Dynamic Toxicity Variant 3: Interaction Quality Contagion
#
# Agents who interact with low-quality counterparts have their trust
# memory shifted downward, degrading their future interaction quality
# with ALL counterparts -- not just the toxic one.  This models
# reputational contamination or learned bad behavior.
#
# Unlike the existing pairwise trust EMA (which only affects bilateral
# acceptance decisions), this creates an ecosystem-wide contagion:
# toxicity spreads through the interaction graph like an epidemic.
#
# Key question: does contagion produce qualitatively different dynamics
# (e.g., gradual endemic toxicity) vs. the sharp phase transitions in
# the static model?

scenario_id: dynamic_toxicity_contagion
description: "Quality contagion: toxic interactions degrade ecosystem-wide trust"
motif: dynamic_toxicity

agents:
  - type: honest
    count: 6
  - type: opportunistic
    count: 2
  - type: deceptive
    count: 2
  # 40% adversarial -- near the static phase transition boundary

governance:
  transaction_tax_rate: 0.0
  transaction_tax_split: 0.5
  reputation_decay_rate: 0.95
  bandwidth_cap: 10
  staking_enabled: false
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  audit_enabled: true
  audit_probability: 0.1
  audit_threshold_p: 0.4

simulation:
  n_epochs: 30
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 3

payoff:
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

dynamic_toxicity:
  enabled:
    - quality_contagion
  quality_contagion:
    gamma: 0.1     # contagion strength per epoch
    neutral: 0.5   # neutral point for quality pull

success_criteria:
  min_epochs: 30
  min_agents: 5
  min_net_social_welfare: 0.0

outputs:
  event_log: "logs/dynamic_toxicity_contagion_events.jsonl"
