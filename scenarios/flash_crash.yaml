# Flash Crash Scenario
# Models cascading confidence collapse analogous to the 2010 Flash Crash.
#
# Setup: A healthy swarm of agents operating normally, then at epoch 5
# an exogenous shock (analogous to Waddell & Reed's $4.1B sell order)
# triggers a cascading confidence collapse. Agents withdraw as confidence
# drops, further reducing "liquidity" and deepening the crash. Circuit
# breakers trip when confidence falls below 20%, halting activity. Recovery
# is slow and asymmetric — matching the empirical pattern where crashes
# happen in minutes but recovery takes hours.
#
# Key dynamics:
#   - Positive feedback loop: low confidence → withdrawal → less liquidity → lower confidence
#   - Circuit breaker: halts activity when confidence < 0.2 (like NYSE Level 1 halt)
#   - Asymmetric recovery: recovery rate (0.05/step) << crash rate
#   - Fundamental-dependent recovery: only recovers if avg interaction quality > 0.5

scenario_id: flash_crash
description: >
  Flash crash simulation modeling cascading confidence collapse in a
  multi-agent swarm. Demonstrates how feedback loops between agent
  withdrawals and declining system confidence can produce rapid market-like
  crashes, and how circuit breakers and fundamental quality affect recovery.
motif: cascade_failure

agents:
  # Market makers — honest agents providing "liquidity"
  - type: honest
    count: 5
    name: market_maker

  # Algorithmic traders — opportunistic, will withdraw quickly
  - type: opportunistic
    count: 3
    name: algo_trader

  # Spoofing/manipulative agent — may exacerbate the crash
  - type: deceptive
    count: 1
    name: spoofer

  # Cautious agent — withdraws early, returns late
  - type: cautious
    count: 1
    name: cautious_participant

governance:
  # Circuit breaker enabled — will trip during the crash
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  freeze_threshold_violations: 3
  freeze_duration_epochs: 1

  # Transaction tax (Tobin tax analogy — friction to slow crashes)
  transaction_tax_rate: 0.02
  transaction_tax_split: 0.5

  # Reputation decays — recent behavior matters more
  reputation_decay_rate: 0.9

  # Bandwidth cap — limits activity rate
  bandwidth_cap: 10

simulation:
  n_epochs: 20
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 3

payoff:
  s_plus: 2.0
  s_minus: 1.5   # Higher loss magnitude — amplifies crash impact
  h: 2.5         # Higher externality — cascade damage is severe
  theta: 0.5
  rho_a: 0.1     # Some externality internalization
  rho_b: 0.1
  w_rep: 1.5     # Reputation matters more — panic about reputation loss

# Flash crash specific configuration
flash_crash:
  trigger_type: exogenous_shock
  trigger_epoch: 5
  trigger_magnitude: 0.4
  cascade_feedback_rate: 0.3
  cascade_contagion_rate: 0.5
  confidence_floor: 0.05
  withdrawal_threshold: 0.4
  circuit_breaker_enabled: true
  circuit_breaker_threshold: 0.2
  circuit_breaker_duration_steps: 5
  circuit_breaker_cooldown_epochs: 1
  recovery_rate: 0.05
  recovery_requires_fundamentals: true
  recovery_fundamental_threshold: 0.5
  initial_confidence: 0.8
  liquidity_depth: 1.0
  spoofing_enabled: false

# Perturbations layer on top of flash crash dynamics
perturbations:
  # Signal corruption kicks in during the crash — models information degradation
  signal_corruption:
    enabled: true
    targets:
      - task_progress_delta
      - counterparty_engagement_delta
    mode: random
    schedule:
      - start_epoch: 5
        end_epoch: 8

  # Resource drain at trigger — analogous to margin calls
  resource_shock:
    enabled: true
    trigger: epoch
    at_epoch: 5
    mode: drain_all
    magnitude: 0.3

success_criteria:
  # The crash should happen but the system should eventually recover
  min_epochs: 20
  min_agents: 10
  toxicity_threshold: 0.7   # Higher tolerance — crash will spike toxicity

outputs:
  event_log: runs/flash_crash/events.jsonl
  metrics_csv: runs/flash_crash/metrics.csv
