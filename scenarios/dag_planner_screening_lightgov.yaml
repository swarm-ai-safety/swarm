# DAG Planner Screening — Light-Governance Variant
# Matched-governance ablation for the plannerless-vs-dag comparison.
#
# Identical to scenarios/dag_planner_screening.yaml except the
# governance block is copied from scenarios/plannerless_coordination.yaml.
# Pair with `plannerless_coordination.yaml` under the same seeds to
# isolate the coordination mechanism (hierarchical DAG plan screening
# vs emergent artifact exchange) independent of governance-bundle tax.

scenario_id: dag_planner_screening_lightgov
description: "DAG plan screening under light (plannerless-matched) governance"
motif: plan_screening

agents:
  # Honest planners: well-structured DAGs with accurate confidence
  - type: honest
    count: 3
  # Opportunistic planners: shallow DAGs, inflated confidence
  - type: opportunistic
    count: 2
  # Responsive workers (scripted stand-in for a dedicated `adaptive` class)
  - type: opportunistic
    count: 3

governance:
  # Copied from scenarios/plannerless_coordination.yaml so that this
  # variant differs from the full dag_planner_screening only in the
  # coordination mechanism being tested.
  staking_enabled: false

  reputation_decay_rate: 0.95

  audit_enabled: true
  audit_probability: 0.1
  audit_penalty_multiplier: 1.5
  audit_threshold_p: 0.35

  transaction_tax_rate: 0.01
  transaction_tax_split: 0.5

  bandwidth_cap: 15

  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  freeze_threshold_violations: 3
  freeze_duration_epochs: 2

  collusion_detection_enabled: false
  sybil_detection_enabled: false

simulation:
  n_epochs: 20
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 5

payoff:
  # Shared with plannerless_coordination.yaml and dag_planner_screening.yaml.
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

# DAG-specific proxy weight overrides — kept identical to the heavy-
# governance variant so only governance differs.
domain:
  type: hyperspace_dag
  proxy:
    task_progress_weight: 0.35
    rework_weight: 0.20
    verifier_weight: 0.15
    engagement_weight: 0.30
  acceptance_threshold: 0.5
  confidence_floor: 0.3
  max_retries: 3

contracts:
  truthful_auction:
    stake_fraction: 0.1
    audit_probability: 0.1
    audit_threshold_p: 0.35
    penalty_multiplier: 1.5

success_criteria:
  min_epochs: 20
  min_agents: 8
  toxicity_threshold: 0.4

outputs:
  event_log: "logs/dag_screening_lightgov_events.jsonl"
  metrics_csv: "logs/dag_screening_lightgov_metrics.csv"
