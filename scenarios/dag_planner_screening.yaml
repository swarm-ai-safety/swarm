# DAG Planner Screening Scenario
# Tests whether SWARM's screening mechanisms can distinguish
# good task decomposition plans from bad ones, using structural
# features from Hyperspace Architect v1 DAG output.
#
# Research question: does Architect's self-reported confidence
# correlate with actual p (distributional quality)?

scenario_id: dag_planner_screening
description: "Screen Architect DAG plans via soft-label pipeline; measure confidence calibration"
motif: plan_screening

agents:
  # Honest planners: well-structured DAGs with accurate confidence
  - type: honest
    count: 3
  # Opportunistic planners: shallow DAGs, inflated confidence
  - type: opportunistic
    count: 2
  # Responsive workers: accept/reject based on plan quality signals
  # (using opportunistic as the closest registered scripted-agent type;
  # swap to `adaptive_adversary` or a dedicated class if one is added).
  - type: opportunistic
    count: 3

governance:
  transaction_tax_rate: 0.05
  transaction_tax_split: 0.5
  reputation_decay_rate: 0.95
  bandwidth_cap: 10

  staking_enabled: true
  min_stake_to_participate: 0.1

  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.7
  freeze_threshold_violations: 3
  freeze_duration_epochs: 2

  audit_enabled: true
  audit_probability: 0.2
  audit_threshold_p: 0.45
  penalty_multiplier: 2.0

  collusion_detection_enabled: true
  sybil_detection_enabled: true
  adaptive_governance_enabled: true

simulation:
  n_epochs: 20
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 5

payoff:
  # Shared with scenarios/plannerless_coordination.yaml so that the
  # two coordination regimes (hierarchical DAG vs emergent artifact
  # exchange) can be compared on matched payoff + soft metrics.
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

# DAG-specific proxy weight overrides
domain:
  type: hyperspace_dag
  proxy:
    task_progress_weight: 0.35
    rework_weight: 0.20
    verifier_weight: 0.15
    engagement_weight: 0.30
  acceptance_threshold: 0.5
  confidence_floor: 0.3
  max_retries: 3

contracts:
  truthful_auction:
    stake_fraction: 0.1
    audit_probability: 0.2
    audit_threshold_p: 0.45
    penalty_multiplier: 2.0

success_criteria:
  min_epochs: 20
  min_agents: 8
  toxicity_threshold: 0.4

outputs:
  event_log: "logs/dag_screening_events.jsonl"
  metrics_csv: "logs/dag_screening_metrics.csv"
