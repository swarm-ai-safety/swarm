# Plannerless Coordination Scenario
# Tests whether emergent artifact-based coordination (no central task
# assignment) produces adverse selection under soft-label safety metrics.
#
# Inspired by ScienceClaw's ArtifactReactor (Wang et al., 2026):
# - Agents publish typed artifacts and declare needs
# - Pressure scoring drives decentralized task prioritization
# - Schema-overlap matching enables implicit cross-agent handoffs
#
# Research question: Does bottom-up, demand-driven coordination
# systematically pair high-capability agents with low-quality work
# (adverse selection)?  Does synthesis fraction predict welfare?

scenario_id: plannerless_coordination
description: "Emergent artifact-exchange coordination under soft-label safety"
motif: plannerless_reactor

agents:
  # Producers: generate artifacts in their specialty domain
  - type: honest
    count: 4
    # High-quality producers; willing to fulfill high-pressure needs
  - type: opportunistic
    count: 3
    # Selective producers; cherry-pick low-cost artifacts
  - type: deceptive
    count: 2
    # Publish low-quality artifacts that look useful (schema match but bad p)
  - type: honest
    count: 1
    # Specialist with unique artifact kind (high novelty pressure)

governance:
  # Light governance — the point is to test emergent coordination
  staking_enabled: false

  # Reputation decay (agents must keep producing to maintain standing)
  reputation_decay_rate: 0.95

  # Minimal auditing — let the artifact layer do the work
  audit_enabled: true
  audit_probability: 0.1
  audit_penalty_multiplier: 1.5
  audit_threshold_p: 0.35

  # Transaction tax funds governance
  transaction_tax_rate: 0.01
  transaction_tax_split: 0.5

  # Rate limits per the paper's 30-min / 50-per-day spirit
  bandwidth_cap: 15

  # Circuit breaker for safety
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  freeze_threshold_violations: 3
  freeze_duration_epochs: 2

  # No collusion/sybil detection — testing emergent dynamics
  collusion_detection_enabled: false
  sybil_detection_enabled: false

# Artifact layer configuration
artifacts:
  # Artifact kinds and their schemas (for schema-overlap matching)
  schemas:
    - kind: data_collection
      fields: {"dataset_id": "str", "sample_count": "int", "quality_score": "float"}
    - kind: analysis_result
      fields: {"dataset_id": "str", "metric": "str", "value": "float"}
    - kind: verification_result
      fields: {"claim_id": "str", "verified": "bool", "confidence": "float"}
    - kind: synthesis_report
      fields: {"source_ids": "list", "summary": "str", "p_combined": "float"}

  # Pressure scoring weights (inspired by ScienceClaw)
  pressure:
    novelty_weight: 1.0      # Fewer agents fulfilled this = higher priority
    centrality_weight: 1.5   # More agents need this = higher priority
    depth_weight: 0.5        # Deeper in DAG = slight boost
    age_weight: 0.3          # Older needs drift upward (anti-starvation)

  # Artifact expiry
  max_age_steps: 50
  gc_interval_epochs: 5

simulation:
  n_epochs: 30
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 8
  votes_per_epoch: 50
  tasks_per_epoch: 5

payoff:
  # Shared with scenarios/dag_planner_screening.yaml so that the two
  # coordination regimes (emergent artifact exchange vs hierarchical
  # DAG) can be compared on matched payoff + soft metrics.
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

success_criteria:
  min_epochs: 30
  min_agents: 10
  toxicity_threshold: 0.4
  # Plannerless-specific: coordination quality metrics
  min_synthesis_fraction: 0.1       # At least 10% multi-parent interactions
  max_adverse_selection_gap: -0.05  # quality_gap must not be too negative
  min_welfare_delta: 0.0            # Welfare should be non-negative

outputs:
  event_log: "logs/plannerless_coordination_events.jsonl"
  metrics_csv: "logs/plannerless_coordination_metrics.csv"
