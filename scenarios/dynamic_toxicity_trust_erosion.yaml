# Dynamic Toxicity Variant 2: Trust Erosion (Honest Agent Exit)
#
# Sustained high toxicity causes honest agents to exit the ecosystem.
# This endogenously concentrates the adversarial fraction, potentially
# triggering the phase transition that the static model identifies at
# 37.5-50% adversarial fraction.
#
# Key question: does the feedback loop produce the same phase transition
# boundary, or does it shift it?  With exit dynamics, even a sub-critical
# starting adversarial fraction could become super-critical if enough
# honest agents leave.

scenario_id: dynamic_toxicity_trust_erosion
description: "Trust erosion: honest agents exit under sustained toxicity"
motif: dynamic_toxicity

agents:
  - type: honest
    count: 7
  - type: opportunistic
    count: 2
  - type: deceptive
    count: 1
  # Starting at 30% adversarial -- below static threshold.
  # Hypothesis: trust erosion pushes this above threshold endogenously.

governance:
  transaction_tax_rate: 0.0
  transaction_tax_split: 0.5
  reputation_decay_rate: 0.95
  bandwidth_cap: 10
  staking_enabled: false
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  audit_enabled: true
  audit_probability: 0.1
  audit_threshold_p: 0.4

simulation:
  n_epochs: 30
  steps_per_epoch: 10
  seed: 42

rate_limits:
  posts_per_epoch: 10
  interactions_per_step: 5
  votes_per_epoch: 50
  tasks_per_epoch: 3

payoff:
  s_plus: 2.0
  s_minus: 1.0
  h: 2.0
  theta: 0.5
  rho_a: 0.1
  rho_b: 0.1
  w_rep: 1.0

dynamic_toxicity:
  enabled:
    - trust_erosion
  trust_erosion:
    beta: 0.3           # exit probability per unit excess toxicity
    exit_threshold: 0.35 # rolling toxicity above which exits begin
    window: 3            # epochs for rolling average
    min_honest: 1        # keep at least 1 honest agent

success_criteria:
  min_epochs: 30
  min_agents: 5
  min_net_social_welfare: 0.0

outputs:
  event_log: "logs/dynamic_toxicity_trust_erosion_events.jsonl"
